<!doctype html>
<html>
    <head>
        <meta charset="utf-8" />
        <title>Health Login</title>
        <script src="https://unpkg.com/vue@3"></script>
        <style>
            .tabs {
                margin-bottom: 1rem;
            }
            .tabs button {
                margin-right: 0.5rem;
            }
            .error {
                color: red;
            }
            .success {
                color: green;
            }
        </style>
    </head>
    <body>
        <div id="app">
            <h1>Health Login</h1>
            <div class="tabs">
                <button @click="mode = 'login'" :disabled="mode === 'login'">
                    Login
                </button>
                <button @click="mode = 'register'" :disabled="mode === 'register'">
                    Register
                </button>
            </div>

            <form v-if="mode === 'login'" @submit.prevent="doLogin">
                <label>Phone: <input v-model="phone" type="tel" /></label><br />
                <label
                    >Password:
                    <input type="password" v-model="password" /></label
                ><br />
                <button type="submit">Login</button>
            </form>

            <form v-else @submit.prevent="doRegister">
                <label>Phone: <input v-model="phone" type="tel" /></label><br />
                <label
                    >Password:
                    <input type="password" v-model="password" /></label
                ><br />
                <button type="submit">Register</button>
            </form>

            <p v-if="error" class="error">{{ error }}</p>
            <p v-if="message" class="success">{{ message }}</p>
        </div>
        <script>
            const app = Vue.createApp({
                data() {
                    return {
                        mode: "login",
                        phone: "",
                        password: "",
                        error: "",
                        message: "",
                    };
                },
                watch: {
                    mode() {
                        this.error = "";
                        this.message = "";
                    },
                },
                methods: {
                    async doLogin() {
                        this.error = "";
                        this.message = "";
                        try {
                            const res = await fetch(
                                "http://localhost:8080/login",
                                {
                                    method: "POST",
                                    headers: {
                                        "Content-Type": "application/json",
                                    },
                                    body: JSON.stringify({
                                        phone: this.phone,
                                        password: this.password,
                                    }),
                                },
                            );
                            if (res.ok) {
                                const data = await res.json();
                                localStorage.setItem("token", data.token);
                                window.location.href = "/success.html";
                            } else {
                                const text = await res.text();
                                this.error = text || "Login failed";
                            }
                        } catch (e) {
                            this.error = e.message;
                        }
                    },
                    async doRegister() {
                        this.error = "";
                        this.message = "";
                        try {
                            const res = await fetch(
                                "http://localhost:8080/register",
                                {
                                    method: "POST",
                                    headers: {
                                        "Content-Type": "application/json",
                                    },
                                    body: JSON.stringify({
                                        phone: this.phone,
                                        password: this.password,
                                    }),
                                },
                            );
                            if (res.ok) {
                                this.message = "Registration successful. Please log in.";
                                this.mode = "login";
                            } else {
                                const text = await res.text();
                                this.error = text || "Registration failed";
                            }
                        } catch (e) {
                            this.error = e.message;
                        }
                    },
                },
            });
            app.mount("#app");
        </script>
    </body>
</html>
