services:
  db:
    image: postgres:16-alpine
    container_name: healthlogin_db
    environment:
      POSTGRES_USER: healthlogin
      POSTGRES_PASSWORD: healthlogin
      POSTGRES_DB: healthlogin
    volumes:
      - ./backend/migrations:/docker-entrypoint-initdb.d:ro
    ports:
      - "5432:5432"

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: healthlogin_backend
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: healthlogin
      DB_PASSWORD: healthlogin
      DB_NAME: healthlogin
    depends_on:
      - db
    ports:
      - "8080:8080"

  frontend:
    build:
      context: .
      dockerfile: frontend.Dockerfile
    container_name: healthlogin_frontend
    depends_on:
      - backend
    ports:
      - "3000:80"

networks:
  default:
    driver: bridge
